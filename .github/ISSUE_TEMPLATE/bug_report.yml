name: Bug report
description: Something behaves incorrectly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. aos ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `aos --version` and `aos doctor`, plus OS and Python version.
      render: text
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, config snippets (redact secrets), screenshots.
